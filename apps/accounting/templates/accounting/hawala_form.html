{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

<form method="post">

{% csrf_token %}

<div class="card shadow-sm">

    <div class="card-header">

        <h4>

            Add Hawala Account

        </h4>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label>

                    Company Name

                </label>

                {{ form.name }}

            </div>

            <div class="col-md-6 mb-3">

                <label>

                    Contact Person

                </label>

                {{ form.contact_person }}

            </div>

        </div>

        <div class="row">

            <div class="col-md-4 mb-3">

                <label>

                    Phone

                </label>

                {{ form.phone }}

            </div>

            <div class="col-md-4 mb-3">

                <label>

                    Email

                </label>

                {{ form.email }}

            </div>

            <div class="col-md-4 mb-3">

                <label>

                    City

                </label>

                {{ form.city }}

            </div>

        </div>

        <div class="mb-3">

            <label>

                Address

            </label>

            {{ form.address }}

        </div>

        <div class="mb-3">

            <label>

                Notes

            </label>

            {{ form.notes }}

        </div>

        <div class="form-check mb-3">

            {{ form.is_active }}

            <label class="form-check-label">

                Active

            </label>

        </div>

    </div>

    <div class="card-footer">

        <button type="submit"
                class="btn btn-primary">

            Save Hawala Account

        </button>

        <a href="{% url 'hawala_list' %}"
           class="btn btn-secondary">

            Cancel

        </a>

    </div>

</div>

</form>

</div>

{% endblock %}
