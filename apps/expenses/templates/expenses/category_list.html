{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>
            Expense Categories
        </h3>

        <a href="{% url 'expenses:category_create' %}"
           class="btn btn-primary">
            Add Category
        </a>

    </div>

    <div class="card">

        <div class="card-body">

            <table id="categoryTable"
                   class="table table-bordered table-striped">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Created At</th>
                        <th>Delete</th>
                    </tr>

                </thead>

                <tbody>

                    {% for cat in categories %}

                    <tr>

                        <td>
                            {{ cat.id }}
                        </td>

                        <td>
                            {{ cat.name }}
                        </td>

                        <td>
                            {{ cat.created_at|date:"d M Y" }}
                        </td>

                        <td>
                            <form method="POST"
                                action="{% url 'expenses:category_delete' cat.id %}"
                                onsubmit="return confirm('Are you sure you want to delete this category?');">

                                {% csrf_token %}

                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger">
                                    Delete
                                </button>

                            </form>
                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}


{% block extra_js %}

<script>

$(document).ready(function () {

    $('#categoryTable').DataTable({
        pageLength: 25
    });

});

</script>

{% endblock %}
