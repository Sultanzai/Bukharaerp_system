{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

<form method="post">

{% csrf_token %}

<div class="card shadow-sm">

    <div class="card-header">

        <h4>

            Add Investor

        </h4>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label>Name</label>

                {{ form.name }}

            </div>

            <div class="col-md-6 mb-3">

                <label>Phone</label>

                {{ form.phone }}

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label>Email</label>

                {{ form.email }}

            </div>

            <div class="col-md-6 mb-3">

                <label>Active</label>

                <br>

                {{ form.is_active }}

            </div>

        </div>

        <div class="mb-3">

            <label>Address</label>

            {{ form.address }}

        </div>

        <div class="mb-3">

            <label>Notes</label>

            {{ form.notes }}

        </div>

    </div>

    <div class="card-footer">

        <button type="submit"
                class="btn btn-primary">

            Save Investor

        </button>

    </div>

</div>

</form>

</div>

{% endblock %}
