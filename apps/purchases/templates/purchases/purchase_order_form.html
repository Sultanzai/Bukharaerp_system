{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card">

        <div class="card-header">
            <h4>Create Purchase Order</h4>
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-success">
                    Save
                </button>

                <a href="{% url 'purchases:factory_purchase_orders' factory.id %}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
