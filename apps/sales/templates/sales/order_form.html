{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

<form method="post">

    {% csrf_token %}

    <div class="card shadow-sm mb-3">

        <div class="card-header">
            <h4>Create Order</h4>
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-4">

                    <label class="form-label">Customer</label>

                    <select
                        name="customer"
                        id="customer-select"
                        class="form-select"
                        required>
                    </select>

                </div>

                <div class="col-md-3">

                    <label class="form-label">Order Type</label>

                    <select
                        name="order_type"
                        class="form-select">

                        <option value="stock">
                            Stock Order
                        </option>

                        <option value="factory">
                            Factory Order
                        </option>

                        <option value="mixed">
                            Mixed Order
                        </option>

                    </select>

                </div>

                <div class="col-md-5">

                    <label class="form-label">Notes</label>

                    <textarea
                        name="notes"
                        class="form-control"
                        rows="1"></textarea>

                </div>

            </div>

        </div>

    </div>


    <div class="card shadow-sm mb-3">

        <div class="card-header">

            <div class="row">

                <div class="col-md-8">

                    <label class="form-label">
                        Search SKU / Product
                    </label>

                    <select
                        id="variant-search"
                        class="form-select">
                    </select>

                </div>

                <div class="col-md-4 d-flex align-items-end">

                    <button
                        type="button"
                        class="btn btn-success"
                        id="add-item">

                        Add Item

                    </button>

                </div>

            </div>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped">

                <thead>

                <tr>

                    <th>SKU</th>
                    <th>Product</th>
                    <th>Size</th>
                    <th>Color</th>
                    <th>Factory</th>
                    <th>Stock</th>
                    <th width="120">Price</th>
                    <th width="100">Qty</th>
                    <th width="120">Total</th>
                    <th width="80"></th>

                </tr>

                </thead>

                <tbody id="order-items">

                </tbody>

            </table>

        </div>

    </div>


    <div class="card shadow-sm">

        <div class="card-body">

            <div class="row">

                <div class="col-md-9"></div>

                <div class="col-md-3">

                    <h4>

                        Grand Total :

                        <span id="grand-total">

                            0.00

                        </span>

                    </h4>

                </div>

            </div>

            <button class="btn btn-primary">

                Save Order

            </button>

        </div>

    </div>

</form>

</div>

{% endblock %}


{% block extra_js %}

<script>

$(document).ready(function(){

    let selectedVariant = null;


    $('#customer-select').select2({

        width:'100%',
        placeholder:'Search Customer',
        minimumInputLength:0,

        ajax:{

            url:"{% url 'sales:customer_search' %}",

            dataType:'json',

            delay:250,

            data:function(params){

                return {
                    term:params.term || ''
                };

            },

            processResults:function(data){

                return data;

            }

        }

    });


    $('#variant-search').select2({

        width:'100%',
        placeholder:'Search SKU / Product',
        minimumInputLength:0,

        ajax:{

            url:"{% url 'sales:variant_search' %}",

            dataType:'json',

            delay:250,

            data:function(params){

                return {
                    term:params.term || ''
                };

            },

            processResults:function(data){

                return data;

            }

        }

    });


    $('#variant-search').on('select2:select', function(e){

        selectedVariant = e.params.data;

    });



    $('#add-item').click(function(){

        if(selectedVariant == null){

            alert("Select a product first");

            return;

        }

        let total = parseFloat(selectedVariant.price).toFixed(2);

        let row = `

        <tr>

            <td>

                ${selectedVariant.sku}

                <input
                    type="hidden"
                    name="variant_id[]"
                    value="${selectedVariant.id}">
            </td>

            <td>${selectedVariant.product}</td>

            <td>${selectedVariant.size}</td>

            <td>${selectedVariant.color}</td>

            <td>${selectedVariant.factory}</td>

            <td>${selectedVariant.stock}</td>

            <td>

                <input
                    type="number"
                    step="0.01"
                    class="form-control price"
                    name="price[]"
                    value="${selectedVariant.price}">

            </td>

            <td>

                <input
                    type="number"
                    class="form-control qty"
                    name="qty[]"
                    value="1">

            </td>

            <td>

                <span class="line-total">

                    ${total}

                </span>

            </td>

            <td>

                <button
                    type="button"
                    class="btn btn-danger remove-row">

                    Remove

                </button>

            </td>

        </tr>

        `;

        $('#order-items').append(row);

        calculateGrand();

    });



    $(document).on('keyup change','.qty,.price',function(){

        let row = $(this).closest('tr');

        let qty = parseFloat(row.find('.qty').val()) || 0;

        let price = parseFloat(row.find('.price').val()) || 0;

        let total = qty * price;

        row.find('.line-total').text(total.toFixed(2));

        calculateGrand();

    });



    $(document).on('click','.remove-row',function(){

        $(this).closest('tr').remove();

        calculateGrand();

    });



    function calculateGrand(){

        let grand = 0;

        $('.line-total').each(function(){

            let value = $(this).text().replace(/,/g, '').trim();
            grand += parseFloat(value) || 0;

        });

        $('#grand-total').text(grand.toFixed(2));
    }

});

</script>

{% endblock %}
