{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow-sm border-0">

                <div class="card-header text-black">
                    <h4 class="mb-0">
                        Create Customer
                    </h4>
                </div>

                <div class="card-body">

                    <form method="post">

                        {% csrf_token %}

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Customer Name
                                </label>

                                <input type="text"
                                       name="name"
                                       class="form-control"
                                       value="{{ form.name.value|default:'' }}"
                                       required>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label fw-semibold">
                                    Phone Number
                                </label>

                                <input type="text"
                                       name="phone"
                                       class="form-control"
                                       value="{{ form.phone.value|default:'' }}">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       value="{{ form.email.value|default:'' }}">
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-semibold">
                                    Address
                                </label>

                                <textarea name="address"
                                          rows="3"
                                          class="form-control">{{ form.address.value|default:'' }}</textarea>
                            </div>

                            <div class="col-md-3">

                                <div class="form-check mt-4">

                                    <input class="form-check-input"
                                           type="checkbox"
                                           name="active"
                                           checked>

                                    <label class="form-check-label">
                                        Active Customer
                                    </label>

                                </div>

                            </div>

                        </div>

                        <hr>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-primary">
                                Save Customer
                            </button>

                            <a href="{% url 'sales:customer_list' %}"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
